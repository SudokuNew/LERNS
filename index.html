<!doctype html>
<html lang="ja">
    <head>
        <meta charset="utf-8" />
        <title>LERNS — Test Planner</title>

        <meta
            name="viewport"
            content="width=device-width,initial-scale=1,viewport-fit=cover"
        />
        <meta name="theme-color" content="#0BDAFF" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <link rel="manifest" href="manifest.json" />
        <link rel="icon" href="icons/lerns_logo_32.png" sizes="32x32" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="icons/lerns_logo_180.png"
        />
        <link rel="stylesheet" href="css/style.css" />
        <link rel="stylesheet" href="css/tabs.css" />
        <link rel="stylesheet" href="css/kotowaza.css" />
    </head>

    <body>
        <div class="bg-fixed" aria-hidden="true"></div>

        <!-- ラッパー -->
        <div class="app-wrapper">
            <div
                class="app"
                id="app"
                role="application"
                aria-label="LERNS learning app"
            >
                <header class="top-hero">
                    <div class="hero-bg">
                        <img
                            class="hero-icon"
                            src="icons/lerns_logo_192.png"
                            alt=""
                            aria-hidden="true"
                            style="width: 56px; height: 56px"
                        />
                        <div class="hero-content">
                            <h1 style="margin: 0; font-size: 1.25rem">
                                L.E.R.N.S.
                            </h1>
                            <p class="subtitle" style="margin: 0">
                                勉強時間を記録して、計画を着実に進めよう
                            </p>
                        </div>
                    </div>
                </header>

                <main>
                    <!-- アイコンタブ：ホームを追加 -->
                    <div class="icon-tabs" role="tablist" aria-label="主な操作">
                        <!-- 新しいホームタブ（デフォルト選択） -->
                        <button
                            class="icon-tab"
                            id="tab-home"
                            role="tab"
                            aria-selected="true"
                            aria-controls="panel-home"
                            data-action="home"
                            title="ホーム"
                        >
                            <span class="visually-hidden">ホーム</span>
                        </button>

                        <!-- 記録タブ -->
                        <button
                            class="icon-tab"
                            id="tab-log"
                            role="tab"
                            aria-selected="false"
                            aria-controls="panel-log"
                            data-action="log"
                            title="記録"
                        >
                            <span class="visually-hidden">記録</span>
                        </button>

                        <!-- 計画表タブ -->
                        <button
                            class="icon-tab"
                            id="tab-schedule"
                            role="tab"
                            aria-selected="false"
                            aria-controls="panel-schedule"
                            data-action="schedule"
                            title="計画表"
                        >
                            <span class="visually-hidden">計画表</span>
                        </button>

                        <!-- 動画タブ -->
                        <button
                            class="icon-tab"
                            id="tab-video"
                            role="tab"
                            aria-selected="false"
                            aria-controls="panel-video"
                            data-action="video"
                            title="動画"
                        >
                            <span class="visually-hidden">動画</span>
                        </button>
                    </div>

                    <!-- 1. ホームパネル（新設）: タイマーと統計を表示 -->
                    <section
                        id="panel-home"
                        role="tabpanel"
                        aria-labelledby="tab-home"
                        class="fade-in-on-scroll visible"
                    >
                    <!-- 四字熟語・ことわざカード -->
                    <div class="kotowaza-card kotowaza-default-bg" id="kotowaza-card" aria-label="今日の四字熟語">

                        <!-- 前へボタン -->
                        <button class="kotowaza-nav" id="kotowaza-prev" aria-label="前の熟語">
                            &#8249;
                        </button>

                        <!-- メインテキストエリア -->
                        <div class="kotowaza-content">
                            <p id="kotowaza-text" class="kotowaza-fade-in">雲外蒼天</p>
                            <p id="kotowaza-yomi" class="kotowaza-fade-in">うんがいそうてん</p>
                            <p id="kotowaza-meaning" class="kotowaza-fade-in">苦難の雲を乗り越えた先に、青く澄み渡る空が広がる</p>
                        </div>

                        <!-- 次へボタン -->
                        <button class="kotowaza-nav" id="kotowaza-next" aria-label="次の熟語">
                            &#8250;
                        </button>

                        <!-- ページ番号 -->
                        <span class="kotowaza-footer" id="kotowaza-indicator">1 / 10</span>

                    </div>
                        
                        <!-- 合計時間表示（Stats） -->
                        <div id="stats" style="margin-bottom: 16px">
                            <div id="total-time">合計学習時間: 0 分</div>
                        </div>

                        <!-- 学習タイマー -->
                        <section
                            class="timer"
                            aria-label="学習タイマー"
                            id="studyTimerSection"
                        >
                            <div class="timer-display" aria-live="polite">
                            <div class="timer-circle">
                                <svg width="200" height="200">
                                    <!-- 背景 -->
                                    <circle cx="100" cy="100" r="90" stroke="#eee" stroke-width="10" fill="none" />
                                    <!-- 進捗 -->
                                    <circle id="progressCircle" cx="100" cy="100" r="90" stroke="#4caf50"
                                        stroke-width="10" fill="none" stroke-linecap="round"
                                        transform="rotate(-90 100 100)" />
                                </svg>

                                <div class="timer-text" id="timerTime">25:00</div>
                            </div>
                                <div class="timer-mode" id="timerMode">
                                    ポモドーロ
                                </div>
                            </div>
                            <div class="timer-controls" style="margin-top: 8px">
                                <button id="timerStart" class="action-btn">
                                    開始
                                </button>
                                <button
                                    id="timerPause"
                                    class="action-btn"
                                    disabled
                                >
                                    一時停止
                                </button>
                                <button id="timerReset" class="action-btn">
                                    リセット
                                </button>
                            </div>
                        </section>

                        <p
                            style="
                                text-align: center;
                                color: var(--muted);
                                margin-top: 24px;
                                font-size: 0.9rem;
                            "
                        >
                            今日も一日、コツコツ積み上げましょう。
                        </p>
                    </section>

                    <!-- 2. 記録パネル -->
                    <section
                        id="panel-log"
                        role="tabpanel"
                        aria-labelledby="tab-log"
                        hidden
                    >
                        <div style="text-align: center; padding: 2rem 0">
                            <p
                                style="
                                    margin-bottom: 1rem;
                                    font-weight: bold;
                                    color: var(--primary);
                                "
                            >
                                学習が終わったら記録しましょう
                            </p>
                            <!-- ここに本来モーダルを開くボタンなどを置くのが自然ですが、
                             既存の実装に合わせて案内文、またはアクションボタンを配置 -->
                            <button
                                class="action-btn primary"
                                onclick="
                                    document
                                        .getElementById('log-time-modal')
                                        .setAttribute('aria-hidden', 'false')
                                "
                            >
                                記録フォームを開く
                            </button>
                        </div>
                    </section>

                    <!-- 3. 計画表パネル -->
                    <section
                        id="panel-schedule"
                        role="tabpanel"
                        aria-labelledby="tab-schedule"
                        hidden
                    >
                        <div
                            id="pdfViewer"
                            class="pdf-wrapper"
                            role="region"
                            aria-label="計画表"
                            style="display: block"
                        >
                            <iframe
                                src="docs/plan_grade2_2nd.pdf"
                                width="100%"
                                height="600px"
                                style="border: none; border-radius: 8px"
                                tabindex="-1"
                            ></iframe>
                            <div
                                style="
                                    margin-top: 0.5rem;
                                    text-align: center;
                                    font-size: 0.9rem;
                                "
                            >
                                <a
                                    href="docs/plan_grade2_2nd.pdf"
                                    target="_blank"
                                    rel="noopener"
                                    >新しいタブで開く</a
                                >
                            </div>
                        </div>
                    </section>

                    <!-- 4. 動画パネル -->
                    <section
                        id="panel-video"
                        role="tabpanel"
                        aria-labelledby="tab-video"
                        hidden
                    >
                        <div class="video-controls-area" id="videoControlsArea">
                            <div
                                id="videoPlayer"
                                class="video-wrapper"
                                role="region"
                                aria-label="勉強用動画"
                                style="display: block"
                            >
                                <label
                                    for="videoSelect"
                                    style="
                                        display: block;
                                        margin-bottom: 8px;
                                        font-weight: bold;
                                    "
                                    >BGM・環境音を選択</label
                                >
                                <select
                                    id="videoSelect"
                                    style="
                                        width: 100%;
                                        padding: 8px;
                                        margin-bottom: 12px;
                                        border-radius: 8px;
                                        border: 1px solid #ccc;
                                    "
                                >
                                    <option value="nSvZ-PctSVI">
                                        STARBACKS-集中力を高めるカフェの音
                                    </option>
                                    <option value="4YUwV8kIYdc">
                                        勉強用BGM-生産性の上がる焚火の音
                                    </option>
                                    <option value="v-8RqKQPNak">
                                        勉強用BGM-海岸の焚火の音で集中
                                    </option>
                                </select>

                                <iframe
                                    id="videoFrame"
                                    width="100%"
                                    height="315"
                                    src="https://www.youtube.com/embed/4YUwV8kIYdc?rel=0"
                                    title="勉強用動画"
                                    frameborder="0"
                                    allow="autoplay; encrypted-media"
                                    allowfullscreen
                                    tabindex="-1"
                                    style="border-radius: 8px"
                                ></iframe>
                            </div>
                        </div>
                    </section>
                </main>

                <footer
                    style="
                        text-align: center;
                        color: var(--muted);
                        font-size: 12px;
                        margin-top: auto;
                        padding: 12px;
                    "
                >
                    Local mode · For personal use
                </footer>
            </div>
        </div>

        <!-- モーダルは body 末尾に配置 -->
        <div
            id="log-time-modal"
            class="modal"
            role="dialog"
            aria-hidden="true"
            aria-labelledby="log-time-title"
        >
            <div class="modal-panel">
                <h2 id="log-time-title">勉強時間を記録</h2>
                <label style="display: block; margin-top: 8px"
                    >科目
                    <select
                        id="subject-select"
                        style="width: 100%; padding: 8px; margin-top: 6px"
                    >
                        <option>数学</option>
                        <option>英語</option>
                        <option>国語</option>
                        <option>理科</option>
                    </select>
                </label>
                <label style="display: block; margin-top: 8px"
                    >時間（分）
                    <input
                        id="study-minutes"
                        type="number"
                        min="1"
                        value="30"
                        style="width: 100%; padding: 8px; margin-top: 6px"
                    />
                </label>
                <div class="modal-actions">
                    <button id="save-time" class="btn primary">保存</button>
                    <button class="btn" data-action="close-modal">
                        キャンセル
                    </button>
                </div>
            </div>
        </div>

        <div
            id="schedule-modal"
            class="modal"
            role="dialog"
            aria-hidden="true"
            aria-labelledby="schedule-title"
        >
            <div class="modal-panel">
                <h2 id="schedule-title">計画表</h2>
                <div
                    id="schedule-content"
                    style="margin-top: 10px; max-height: 50vh; overflow: auto"
                ></div>
                <div class="modal-actions">
                    <button class="btn" data-action="close-modal">
                        閉じる
                    </button>
                </div>
            </div>
        </div>
    </body>

    <script src="js/functions.js" defer></script>
    <script src="js/tabs.js" defer></script>
    <script src="js/kotowaza.js" defer></script>
</html>
